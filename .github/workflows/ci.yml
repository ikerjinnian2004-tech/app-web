name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: ruff check .
      - run: black --check .

  test:
    needs: quality
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-test-key-minimo-32-chars-xxxxxx
      IDENTITY_HMAC_KEY: ci-hmac-key-minimo-32-caracteres-xxxx
      ADMIN_EXPORT_TOKEN: ci-admin-token
      EXAM_DURATION_MINUTES: '90'
      SANDBOX_TIMEOUT_SECONDS: '2'
      SANDBOX_MAX_OUTPUT_CHARS: '5000'
      SANDBOX_USE_DOCKER: 'false'
      SANDBOX_IMAGE: python:3.11-slim
      SANDBOX_MEM_LIMIT_MB: '64'
      SANDBOX_CPU: '0.5'
      SANDBOX_PIDS_LIMIT: '50'
      ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
      LOG_LEVEL: INFO
      HEALTHCHECK_INTERVAL_SECONDS: '30'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -v

  security:
    needs: test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:///./ci.db
      SECRET_KEY: ci-test-key-minimo-32-chars-xxxxxx
      IDENTITY_HMAC_KEY: ci-hmac-key-minimo-32-caracteres-xxxx
      ADMIN_EXPORT_TOKEN: ci-admin-token
      EXAM_DURATION_MINUTES: '90'
      SANDBOX_TIMEOUT_SECONDS: '2'
      SANDBOX_MAX_OUTPUT_CHARS: '5000'
      SANDBOX_USE_DOCKER: 'false'
      SANDBOX_IMAGE: python:3.11-slim
      SANDBOX_MEM_LIMIT_MB: '64'
      SANDBOX_CPU: '0.5'
      SANDBOX_PIDS_LIMIT: '50'
      ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
      LOG_LEVEL: INFO
      HEALTHCHECK_INTERVAL_SECONDS: '30'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_sandbox_security.py -v
