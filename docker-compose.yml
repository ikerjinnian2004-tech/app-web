services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - '8000:8000'
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql+psycopg2://evaluador:evaluador@db:5432/evaluador
      WEB_CONCURRENCY: 2
    command: >
      sh -c "uvicorn backend.main:app --host 0.0.0.0 --port 8000 --workers ${WEB_CONCURRENCY:-2}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15.13-alpine@sha256:1414298ea93186123a6dcf872f778ba3bd2347edcbd2f31aa7bb2d9814ff5393
    environment:
      POSTGRES_DB: evaluador
      POSTGRES_USER: evaluador
      POSTGRES_PASSWORD: evaluador
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evaluador -d evaluador']
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: nginx:1.28.3-alpine@sha256:a8b39bd9cf0f83869a2162827a0caf6137ddf759d50a171451b335cecc87d236
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - '5500:80'

volumes:
  postgres_data: {}
