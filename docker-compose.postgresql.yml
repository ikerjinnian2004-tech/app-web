name: evaluador-tfg-postgresql

services:
  db_postgresql_test:
    image: ${POSTGRES_TEST_IMAGE:-postgres:15.13-alpine@sha256:1414298ea93186123a6dcf872f778ba3bd2347edcbd2f31aa7bb2d9814ff5393}
    environment:
      POSTGRES_DB: evaluador_test
      POSTGRES_USER: evaluador_test
      POSTGRES_PASSWORD: evaluador_test_local
    ports:
      - '127.0.0.1:55432:5432'
    tmpfs:
      - /var/lib/postgresql/data:rw,noexec,nosuid,size=256m
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U evaluador_test -d evaluador_test']
      interval: 2s
      timeout: 3s
      retries: 30
    security_opt:
      - no-new-privileges:true
