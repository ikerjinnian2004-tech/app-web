<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acceso al prototipo de evaluacion de Python">
  <title>Acceso | Evaluador Python</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <main class="pantalla-acceso">
    <section class="panel-acceso" aria-labelledby="titulo-acceso">
      <p class="etiqueta-centro">Universidad de Castilla-La Mancha</p>
      <h1 id="titulo-acceso">Evaluador de Python</h1>

      <form id="formulario-acceso" class="formulario" novalidate>
        <fieldset class="selector-rol">
          <legend>Rol</legend>
          <label>
            <input type="radio" name="rol" value="alumno" checked>
            <span>Alumno</span>
          </label>
          <label>
            <input type="radio" name="rol" value="profesor">
            <span>Profesor</span>
          </label>
        </fieldset>

        <label for="correo">Correo institucional</label>
        <input id="correo" name="correo" type="email" autocomplete="email" required>

        <section id="bloque-consentimiento" class="bloque-consentimiento">
          <h2>Consentimiento</h2>
          <article id="texto-consentimiento" class="texto-consentimiento"></article>
          <label class="fila-check" for="acepta-grabacion">
            <input id="acepta-grabacion" type="checkbox">
            <span>Acepto las condiciones de supervision y grabacion de evidencias.</span>
          </label>
        </section>

        <p id="mensaje-acceso" class="mensaje" aria-live="polite"></p>
        <button class="boton-principal" type="submit">Entrar</button>
      </form>
    </section>
  </main>

  <script type="module" src="./js/index.js"></script>
</body>
</html>
